name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  detect-docs:
    name: Detect VitePress docs
    runs-on: ubuntu-latest
    outputs:
      has_docs: ${{ steps.detect.outputs.has_docs }}
    steps:
      - uses: actions/checkout@v4
      - name: Check docs layout
        id: detect
        run: |
          if ls docs/.vitepress/config.* >/dev/null 2>&1; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Build and deploy VitePress
    needs: detect-docs
    if: needs.detect-docs.outputs.has_docs == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install docs dependencies
        run: npm ci

      - name: Build VitePress docs
        run: |
          npm run docs:build
          if [ ! -d docs/.vitepress/dist ]; then
            echo "VitePress output directory was not created."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
